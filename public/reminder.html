<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminder Alert</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at center, #ffd1d1 0%, #e54747 55%, #8f1212 100%);
        color: #220707;
      }

      .box {
        width: min(760px, 92vw);
        background: rgba(255, 255, 255, 0.94);
        border: 3px solid #931717;
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 14px 40px rgba(34, 7, 7, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(24px, 4vw, 40px);
        color: #7b0d0d;
      }

      #text {
        margin: 0 0 24px;
        font-size: clamp(22px, 3vw, 36px);
        line-height: 1.2;
        font-weight: 700;
        word-break: break-word;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 30px;
        font-size: 20px;
        font-weight: 700;
        color: #ffffff;
        background: #c81f1f;
        cursor: pointer;
      }

      button:hover {
        background: #a51414;
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1>ВРЕМЯ НАПОМИНАНИЯ</h1>
      <p id="text"></p>
      <button id="okButton" type="button">OK</button>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const text = params.get("text") || "Напоминание";
      const id = params.get("id") || "";

      const textNode = document.getElementById("text");
      const button = document.getElementById("okButton");

      textNode.textContent = text;

      const confirmReminder = async () => {
        if (!id) {
          return;
        }

        await window.reminderAPI.acknowledgeReminder(id);
      };

      button.addEventListener("click", confirmReminder);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          confirmReminder();
        }
      });
    </script>
  </body>
</html>
